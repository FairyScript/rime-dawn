# Rime default settings
# encoding: utf-8

config_version: "1.0"

# 方案列表
schema_list:
  - schema: wanxiang

# 菜单
menu:
  # 每页候选词数量。由于 7、8、9、0 数字键被声调辅助筛选占用，该选项最大值为 6。
  page_size: 6

# 方案选单
switcher:
  caption: 「方案选单」
  hotkeys:
    - Control+grave

  # 切换方案时保留设定的选项。
  save_options:
    - ascii_punct
    - full_shape

  # 呼出选单时是否折叠。
  fold_options: true

  # 折叠时是否缩写选项。
  abbreviate_options: true

  # 折叠时选项的分隔符。
  option_list_separator: '／'

punctuator:
  full_shape:
    __include: punctuation:/full_shape
  half_shape:
    __include: punctuation:/half_shape

# 中英文切换
ascii_composer:
  # CapsLock 行为。
  # true: 切换大写。
  # false: 切换中英。
  # macOS 偏好设置的优先级更高，如果启用了「使用大写锁定键切换“ABC”输入法」则始终切换输入法。
  good_old_caps_lock: true

  # 输入中按下切换按键时行为。
  # commit_code: 上屏编码并切换。
  # commit_text: 上屏文本并切换。
  # clear: 清除未上屏内容并切换。
  # inline_ascii: 临时切换至英文模式，按上屏后回到中文状态。
  # noop: 不切换。
  switch_key:
    Caps_Lock: clear
    Shift_L: commit_code
    Shift_R: commit_code
    Control_L: noop
    Control_R: noop

