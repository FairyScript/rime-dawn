# Rime schema
# encoding: utf-8

schema:
  schema_id: wanxiang
  name: 万象拼音精简版〔基础版 Base〕
  version: "0.6.0-beta.2"  # x-release-please-version
  author:
    - amzxyz
    - Fidel Yin <fidel.yin@hotmail.com>
  description: |
    Rime 拼音/双拼输入方案
  dependencies:
    - wanxiang_mixedcode
    - wanxiang_reverse
    - wanxiang_english

# 开关
# reset: 默认状态。未定义时，切换窗口时不会重置到默认状态。
# states: 方案选单显示的名称。未定义时，仍可以通过快捷键切换。
# abbrev: 单个字符的缩写。未定义时，默认取 states 的第一个字符。
switches:
  # Input
  - name: ascii_mode
    states: [中, 英]
  - name: ascii_punct
    states: ["。，", "．，"]
  - name: full_shape
    states: [半角, 全角]
  # Character Sets
  - name: emoji
    states: [表情关, 表情开]
    abbrev: [🚫, 😀]
  - options: [zh_cn, zh_hant, zh_hk, zh_tw]  # 简繁转换。
    states: [简, 繁, 港繁, 臺繁]
  - name: abbrev
    states: [简码关, 简码开]
    abbrev: [关, 简]
  - name: charset_filter  # 字符集过滤。默认切换快捷键 Ctrl+G。
    states: [大字集, 小字集]
  - options: [pinyin_pinyin, pinyin_zrm, pinyin_znabc, pinyin_flypy, pinyin_mspy, pinyin_sogou, pinyin_ziguang, pinyin_gbpy, pinyin_pyjj, pinyin_lxsq, pinyin_zrlong, pinyin_hxlong]
    states: [全拼, 自然码, 智能ABC, 小鹤双拼, 微软双拼, 搜狗双拼, 紫光双拼, 国标双拼, 拼音加加, 乱序17, 自然龙, 汉心龙]
    abbrev: [拼, 然, 能, 鹤, 微, 搜, 紫, 标, 加, 乱, 龙, 心]
  # Features
  - name: char_priority  # 单字与词组编码重合时，单字或词组优先。
    states: [词组先, 单字先]
    abbrev: [词, 字]
    # Hints
  - options: [comment_off, tone_hint, toneless_hint]  # 显示读音提示。默认切换快捷键 Ctrl+A。
    states: [提示关, 带声调读音, 无声调读音]
    abbrev: [关, 音, 音]
  - options: [raw_code, tone_pinyin_code, toneless_pinyin_code]  # 编码区显示模式。默认切换快捷键 Ctrl+S。
    states: [原编码, 带声调全拼, 无声调全拼]
    abbrev: [关, 拼, 拼]

# 输入引擎
engine:
  processors:
    - lua_processor@*wanxiang.backspace_limiter  # 退格限制
    - ascii_composer
    - recognizer
    - key_binder
    - lua_processor@*wanxiang.key_binder
    - lua_processor@*wanxiang.english*P  # 英文状态处理器，speller 前
    - lua_processor@*wanxiang.tone_corrector  # 声调修正
    - speller
    - lua_processor@*wanxiang.character_selector  # 以词定字，punctuator 前
    - punctuator
    - lua_processor@*wanxiang.keypad_composer  # 小键盘数字键拦截，selector、partial_committer 前
    - lua_processor@*wanxiang.partial_committer  # 候选词部分上屏
    - selector
    - navigator
    - express_editor
    - lua_processor@*wanxiang.candidate_pinner*P  # 候选置顶
    - lua_processor@*wanxiang.auto_phrase  # 自动造词、英文造词
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - affix_segmentor@wanxiang_reverse
    - affix_segmentor@user_dict_appender
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator
    - lua_translator@*wanxiang.version_displayer  # 版本显示
    - lua_translator@*wanxiang.set_schema  # 拼音方案切换
    - lua_translator@*wanxiang.unicode  # Unicode 输入
    - table_translator@custom_phrase
    - table_translator@wanxiang_english
    - table_translator@wanxiang_mixedcode
    - reverse_lookup_translator@wanxiang_reverse
    - table_translator@candidate_pinner  # 候选置顶
    - script_translator@user_dict_appender  # 手动造词
    - script_translator@user_dict  # 使用自造词
  filters:
    - lua_filter@*wanxiang.candidate_code_recorder*F
    - lua_filter@*wanxiang.lookup_filter  # 反查 / 辅助筛选
    - lua_filter@*wanxiang.english*F
    - lua_filter@*wanxiang.charset_filter  # 字符集过滤
    - lua_filter@*wanxiang.candidate_pinner*F  # 候选置顶
    - lua_filter@*wanxiang.preedit_pinyin_expander  # 编码区拼音展开，comment_hint_displayer 前
    - lua_filter@*wanxiang.preedit_tone_displayer  # 声调数字转上标显示
    - lua_filter@*wanxiang.comment_hint_displayer
    - lua_filter@*wanxiang.reorder_filter
    - lua_filter@*wanxiang.phrase_escaper  # 转义字符处理
    - lua_filter@*wanxiang.candidate_type_marker  # 候选类型标记
    - simplifier@s2t
    - simplifier@s2hk
    - simplifier@s2tw
    - simplifier@emoji
    - uniquifier

### Rime 处理器规则 ###

recognizer:
  patterns:
    wanxiang_reverse: "^~[A-Za-z]*$"
    #user_dict_appender: "^@[A-Za-z@']*$"
    unicode: "^U[0-9a-fA-F]+"

# 拼写处理器
speller:
  # 参与编码的按键。此处设定的按键将不直接上屏。
  alphabet: zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA7890~$

  # 首个编码允许的按键。作用同 `alphabet`，但仅作用于首个编码。
  initials: zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA~

  # 允许的分词符。
  # 第一个字符 " "（空格）代表拼音之间的分隔符；第二个字符 "'" 代表允许输入单引号手动分词。
  delimiter: " '"

  # 拼音运算规则。该方案中由自定义文件的 patch 控制。
  algebra:
    __patch:
      - wanxiang_algebra:/base/全拼

# 标点符号
punctuator:
  import_preset: default

  # 数字后标点优化。
  # 指定的数字后的标点将转换为半角标点。
  #digit_separators: ":,."

  # 数字后标点优化行为。
  # commit: 数字后标点直接提交。
  #digit_separator_action: commit

### Rime 翻译器规则 ###

# 主翻译器
translator:
  dictionary: wanxiang
  enable_completion: true  # 启用补全。
  enable_user_dict: true  # 启用自动调频。
  core_word_length: 4  # >0 启用，按段学词 + 相邻段拼接
  max_word_length: 7  # >0 启用，过长短语不记整词，只加元素权重
  contextual_suggestions: false  # 使用 Rime 内置的语法模型，效果一般，建议关闭。
  max_homophones: 8
  max_homographs: 8
  initial_quality: 3
  spelling_hints: 99  # 将候选词在词典中的编码显示在注释中，供 Lua 脚本读取。
  always_show_comments: true  # Rime 默认在 preedit 等于 comment 时取消显示 comment。此处强制显示注释，供 Lua 脚本读取。

  # 为特定输入编码禁用调频。
  #disable_user_dict_for_patterns:
  #  - "^[a-z]{1,6}"

grammar:
  language: wanxiang-lts-zh-hans
  collocation_max_length: 8
  collocation_min_length: 2
  collocation_penalty: -15
  non_collocation_penalty: -1
  weak_collocation_penalty: -100
  rear_penalty: -10

# 自定义短语
custom_phrase:
  dictionary: ""
  user_dict: custom_phrase  #需要手动创建 custom_phrase.txt 文件
  db_class: stabledb  #可设 tabledb〔文本〕或 userdb〔二进制〕
  enable_completion: false  #补全提示
  enable_sentence: false  #禁止造句
  initial_quality: 99  #custom_phrase 的权重应该比 pinyin 和 wanxiang_en 大

wanxiang_english:
  dictionary: wanxiang_english
  user_dict: user_dict_en
  enable_completion: true
  enable_sentence: false
  initial_quality: 2.1
  comment_format:
    - xform/^~.+$//

  ### Lua 相关配置 ###

  # 自动添加空格。
  # off: 关闭。
  # before: 总是前加。
  # after: 总是后加。
  # smart: 连续输入英文时，第二个单词前开始加空格。非输入状态下回车与空格打断加空格状态。
  # 可设置 spacing_timeout 延时取消加空格状态。
  english_spacing: smart

  # 取消加空格状态的延时，单位为秒。设置为 0 则永不超时。
  spacing_timeout: 5

  # 英文造词触发符号，双击触发造词。
  user_dict_trigger: "$"

wanxiang_mixedcode:
  dictionary: wanxiang_mixedcode
  db_class: stabledb
  enable_completion: true
  enable_sentence: false
  initial_quality: 2
  comment_format:  #这里很重要如果残留带声调字母，剩余编码提示计算出错引发程序崩溃
    - xform/.*//

# 部件拆字反查
wanxiang_reverse:
  tag: wanxiang_reverse
  dictionary: wanxiang_reverse
  enable_completion: true
  prefix: "~"  # 反查前缀（反查时前缀会消失），与 recognizer/patterns/wanxiang_reverse 匹配
  tips: "〔反查：拆分|笔画〕"

user_dict:
  dictionary: wanxiang
  user_dict: user_dict
  initial_quality: 0
  enable_completion: false
  enable_sentence: false
  contextual_suggestions: false
  max_homophones: 8
  max_homographs: 8
  spelling_hints: 50
  always_show_comments: true

user_dict_appender:
  tag: user_dict_appender
  dictionary: wanxiang
  user_dict: user_dict
  initial_quality: -1
  spelling_hints: 50
  always_show_comments: true

  # 手动造词引导符。
  prefix: "@"

  # 手动造词提示。
  tips: "〔造词〕"

  ### 自动造词相关配置 ###

  # 启用自动造词。开启后，将自动记录词库中不存在的非句子词条。
  enable_auto_phrase: true

# 候选置顶
candidate_pinner:
  dictionary: ""
  user_dict: pinned
  initial_quality: -1

  ### 候选置顶相关配置 ###

  # 启用候选置顶功能。
  enabled: true

  # 置顶当前候选的按键。
  pin_key: "Control+p"

  # 取消置顶当前候选的按键。
  unpin_key: "Control+l"

emoji:
  option_name: emoji
  opencc_config: emoji.json
  tips: all
  inherit_comment: false

s2t:
  option_name: zh_hant
  opencc_config: s2t.json
  tips: none
  tags: [abc]

s2hk:
  option_name: zh_hk
  opencc_config: s2hk.json
  tips: none
  tags: [abc]

s2tw:
  option_name: zh_tw
  opencc_config: s2tw.json
  tips: none
  tags: [abc]

### 自定义功能 ###

backspace_limiter:
  # 退格限制。
  # 开启时，输入中持续删除至编码为空时，阻止删除已上屏内容。
  # 仅于小狼毫前端生效。
  enabled: false

code_hint:
  # 显示辅助码注释的最大候选词长度。
  max_candidate_length: 1

correction_hint:
  # 显示错音错字注释。
  enabled: true

candidate_type_marker:
  # 各候选类型的注释标记。
  types:
    phrase: ""  # 来自 script_translator（包含主翻译器）的候选词。
    user_phrase: "⁺"  # 来自 script_translator（包含主翻译器）用户词典的候选词。
    table: ""  # 来自 table_translator 的候选词。
    user_table: ""  # 来自 table_translator 用户词典的候选词。
    sentence: "∞"  # 造句候选，启用 enable_sentence 时生成。
    completion: ""  # 补全候选，启用 enable_completion 时生成。
    pinned: "·"  # 置顶候选，由 candidate_pinner 生成。
    message: "ℹ"  # Lua 脚本产生的信息输出。

# 以词定字
character_selector:
  # 选择首个字符的按键。支持按键表达式（如 bracketleft）。
  select_first_key: "["

  # 选择末尾字符的按键。支持按键表达式（如 bracketleft）。
  select_last_key: "]"

keypad_composer:
  # 小键盘模式。
  # auto: 按下小键盘数字键时，若存在待上屏内容，则数字不直接上屏；否则数字直接上屏。
  # compose: 按下小键盘数字键时，数字总是不直接上屏。
  # select: 按下小键盘数字键时，若处于选词状态，则选择对应候选词，否则输入数字。等同于主键盘数字键行为。
  keypad_mode: auto

lookup_filter:
  # 检索的标签。将检索带有所选标签的候选。
  tags: [abc, user_dict_appender]

  # 反查引导符，需添加至 speller/alphabet。
  trigger: "~"

  # 反查数据库。
  dicts: [wanxiang_reverse]

  # 反查数据来源及顺序。
  # aux: 词库携带的辅助码。
  # db: 反查方案数据库。
  data_source: [aux, db]

# 字符集过滤
# charset: 启用的字符集，可设置多个选项，取并集。
#   a: 通用规范汉字表
#   b: GB2312
#   g: GBK
#   T: Big5 (台港澳常用)
#   j: 简体，OpenCC (t2s)
#   f: 通用繁体，OpenCC (s2t)
#   h: 香港繁体，OpenCC (s2hk)
#   t: 台湾繁体，OpenCC (s2tw)
#   u: 基本区，U+4E00 - U+9FFF
#   A-I: 扩展 A-I 区，U+3400 及各扩展区 (支持到 Ext-I)
#   c: 兼容区汉字
# whitelist / blacklist: 针对字符的白名单 / 黑名单。
charset_filter:
  - option: charset_filter
    charset: a
    whitelist:
      - "诶濛硷氽尛躝〇冇吔咗囧屌鲶芶咲畑垅𰻝𰻞龍朙頔"
    blacklist: []
  - option: s2t
    charset: fa
    whitelist: []
    blacklist: []
  - option: s2hk
    charset: ha
    whitelist: []
    blacklist: []
  - option: s2tw
    charset: ta
    whitelist: []
    blacklist: []

### 按键设置 ###

key_binder:
  import_preset: default
  bindings:
    # Ctrl + Shift + 3 切换中英标点。
    - {when: always, toggle: ascii_punct, accept: Control+Shift+3}
    - {when: always, toggle: ascii_punct, accept: Control+Shift+numbersign}

    # Ctrl + Shift + 4 切换简繁。
    - {when: always, toggle: s2t, accept: Control+Shift+4}
    - {when: always, toggle: s2t, accept: Control+Shift+dollar}

    # Option/Alt + ←/→ 切换光标至下/上一个拼音。
    - {when: composing, accept: Alt+Left, send: Shift+Left}
    - {when: composing, accept: Alt+Right, send: Shift+Right}
    - {when: composing, accept: Control+w, send: Control+BackSpace}

    # 分号键选择次选。使用微软双拼或搜狗双拼时，双拼方案占用了分号键，不可启用。
    #- { when: has_menu, accept: semicolon, send: 2 }

    # Ctrl + A 辅助码提示。
    - {when: has_menu, accept: "Control+a", toggle: fuzhu_hint}

    # Ctrl + S 编码区显示模式切换。
    - {when: has_menu, accept: "Control+s", toggle: tone_pinyin_code}

    # Ctrl + G 字符集过滤。
    - {when: has_menu, accept: "Control+g", toggle: charset_filter}
    - {when: composing, accept: "Control+g", toggle: charset_filter}

    # Tab 在不同音节之间跳转。
    - {when: has_menu, accept: "Tab", send: "Control+Right"}
    - {when: composing, accept: "Tab", send: "Control+Right"}

    # 通过 Tab 切换到第一个音节输入辅助码后，Ctrl + Tab 提交并切换至下个音节。
    - {when: composing, accept: "Control+Tab", send_sequence: '{Home}{Shift+Right}{1}{Shift+Right}'}

    # Ctrl + \ 进入造词模式。
    - {when: composing, accept: "Control+backslash", send_sequence: '{Home}@{End}'}


editor:
  bindings:
    space: confirm  # 上屏候选项
    Return: commit_raw_input  # 上屏原始输入
    Control+Return: commit_script_text  # 上屏 preedit
    Control+Shift+Return: commit_comment  # 上屏 comment
    BackSpace: revert  # 向前删除
    Delete: delete  # 向后删除
    Control+BackSpace: back_syllable  # 删除一个音节
    Control+Delete: delete_candidate  # 删除或降权候选项
    Escape: cancel  # 取消输入

# rewind / forward: 在边界按音节移动，在音节内部按字符移动
# left_by_char / right_by_char: 按字符移动（循环）
# left_by_char_no_loop / right_by_char_no_loop: 按字符移动（不循环）
# left_by_syllable / right_by_syllable: 按音节跳转（循环）
# left_by_syllable_no_loop / right_by_syllable_no_loop: 按音节跳转（不循环）
navigator:
  bindings:
    Left: left_by_char_no_loop
    Right: right_by_char_no_loop
    Shift+Left: left_by_syllable
    Shift+Right: right_by_syllable
